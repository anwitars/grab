name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Binary for linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install musl-tools

      - name: Build release
        run: cargo build --release --locked

      - name: Extract Release Notes
        id: extract_notes
        run: .github/scripts/get-changelog-for-version.sh ${GITHUB_REF_NAME#v} > release_notes.txt

      - name: Upload Binary
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/x86_64-unknown-linux-musl/release/grab
          asset_name: grab-linux-static-amd64
          tag: ${{ github.ref }}
          overwrite: true
          body_path: ${{ steps.extract_notes.outputs.release_notes }}

  release-crates:
    name: Release to crates.io
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install musl-tools

      - name: Publish to crates.io
        run: cargo publish --locked --token ${{ secrets.CRATES_IO_TOKEN }}